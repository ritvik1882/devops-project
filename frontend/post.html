<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Post - Blog Sphere</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 text-gray-800">
    <nav class="bg-white shadow-md border-b border-gray-100">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16 items-center">
                <div class="flex-shrink-0 flex items-center">
                    <a href="/" class="text-2xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-indigo-600">
                        Blog Sphere
                    </a>
                </div>
                <div>
                    <a href="/" class="inline-flex items-center px-4 py-2 border border-gray-300 text-sm font-medium rounded-full shadow-sm text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors duration-200">
                        Back to Posts
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto py-10 px-4 sm:px-6 lg:px-8">
        <div id="post-view-container" class="bg-white rounded-2xl shadow-xl overflow-hidden">
            <div class="flex justify-center py-20 text-gray-500 italic">
                <svg class="animate-spin -ml-1 mr-3 h-5 w-5 text-indigo-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                  <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                  <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                Loading post...
            </div>
        </div>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dompurify/3.0.6/purify.min.js"></script>
    <script src="/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const params = new URLSearchParams(window.location.search);
            const postId = params.get('id');
            const container = document.getElementById('post-view-container');

            if (!postId) {
                container.innerHTML = `<div class="text-red-500 text-center py-20 font-semibold text-lg">Post not found</div>`;
                return;
            }

            try {
                const response = await fetch('/api/posts');
                if (!response.ok) throw new Error('Failed to fetch posts');
                const posts = await response.json();
                
                const post = posts.find(p => p.id.toString() === postId);
                if (!post) {
                    container.innerHTML = `<div class="text-red-500 text-center py-20 font-semibold text-lg">Post not found</div>`;
                    return;
                }

                const rawMarkup = marked.parse(post.content);
                const cleanHTML = DOMPurify.sanitize(rawMarkup, { ADD_TAGS: ['iframe'], ADD_ATTR: ['allow', 'allowfullscreen', 'frameborder', 'scrolling'] });

                const coverImageHtml = post.coverImage ? `
                    <div class="w-full h-80 overflow-hidden bg-gray-100">
                        <img src="${post.coverImage}" alt="${post.title}" class="w-full h-full object-cover">
                    </div>
                ` : '';

                container.innerHTML = `
                    ${coverImageHtml}
                    <div class="px-8 py-10 sm:px-12 sm:py-14">
                        <div class="flex items-center gap-x-4 text-sm font-medium text-indigo-600 mb-6">
                            <time datetime="${post.createdAt}">${new Date(post.createdAt).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' })}</time>
                            <span class="text-gray-500 relative flex items-center before:content-[''] before:w-1 before:h-1 before:bg-gray-300 before:rounded-full before:mr-4">${timeAgo(post.createdAt)}</span>
                        </div>
                        
                        <h1 class="text-4xl sm:text-5xl font-extrabold text-gray-900 mb-8 leading-tight">${post.title}</h1>
                        
                        <div class="relative mb-12 flex items-center gap-x-4 border-b border-gray-100 pb-8">
                            <div class="h-12 w-12 rounded-full bg-gradient-to-br from-indigo-500 to-purple-500 flex items-center justify-center text-white font-bold text-xl shadow-inner">
                                ${post.author.charAt(0).toUpperCase()}
                            </div>
                            <div class="text-base leading-6">
                                <p class="font-semibold text-gray-900">${post.author}</p>
                                <p class="text-gray-600 text-sm">Author</p>
                            </div>
                        </div>

                        <div class="prose prose-lg prose-indigo max-w-none text-gray-700">
                            ${cleanHTML}
                        </div>
                    </div>
                `;

                document.title = `${post.title} - Blog Sphere`;

            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = `<div class="text-red-500 text-center py-20 font-semibold text-lg">Error loading post: ${error.message}</div>`;
            }
        });
    </script>
</body>
</html>
